[env:esp32-wrover]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; WROVER has PSRAM — enable it if needed
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    me-no-dev/ESP Async WebServer
    me-no-dev/AsyncTCP
    mikalhart/TinyGPSPlus

; Partition scheme: 4MB flash, no OTA (maximize app space)
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv
