; 共通設定
[common]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
lib_deps =
    me-no-dev/ESP Async WebServer
    me-no-dev/AsyncTCP
    mikalhart/TinyGPSPlus
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv

; 本番ファームウェア（src/ をそのまま使う）
[env:esp32-wrover]
extends = common

; WiFi通信テスト（src/ を除外して tests/test_wifi_dummy/ だけビルド）
[env:test-wifi]
extends = common
build_src_filter = -<*> +<../tests/test_wifi_dummy/>
