; 共通設定
[common]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -Iinclude
board_build.arduino.memory_type = qio_opi
lib_deps =
    mikalhart/TinyGPSPlus
    adafruit/Adafruit BMP280 Library
    adafruit/Adafruit MPU6050
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BusIO
    https://github.com/DFRobot/DFRobot_BMM350.git
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

; 本番ファームウェア XIAO1（センサー・GPS・WiFi・SPIマスター）
[env:xiao1]
extends = common
build_src_filter = -<*> +<../src/xiao1/>

; 本番ファームウェア XIAO2（モータPID制御・誘導フュージョン・SPIスレーブ）
[env:xiao2]
extends = common
build_src_filter = -<*> +<../src/xiao2/>
lib_deps =
    ${common.lib_deps}
    hideakitai/ESP32SPISlave

; WiFi通信テスト（src/ を除外して tests/test_wifi_dummy/ だけビルド）
[env:test-wifi]
extends = common
build_src_filter = -<*> +<../tests/test_wifi_dummy/>

; BMP280単体動作確認（src/ を除外して tests/test_bmp280/ だけビルド）
