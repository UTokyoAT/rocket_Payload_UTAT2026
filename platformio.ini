; 共通設定
[common]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -Iinclude
board_build.arduino.memory_type = qio_opi
lib_deps =
    mikalhart/TinyGPSPlus
    adafruit/Adafruit BMP280 Library
    adafruit/Adafruit MPU6050
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BusIO
    https://github.com/DFRobot/DFRobot_BMM350.git
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

; 本番ファームウェア（src/ をそのまま使う）
[env:esp32-s3]
extends = common

; WiFi通信テスト（src/ を除外して tests/test_wifi_dummy/ だけビルド）
[env:test-wifi]
extends = common
build_src_filter = -<*> +<../tests/test_wifi_dummy/>

; BMP280単体動作確認（src/ を除外して tests/test_bmp280/ だけビルド）
[env:test-bmp280]
extends = common
build_src_filter = -<*> +<../tests/test_bmp280/>

; MPU6050単体動作確認（src/ を除外して tests/test_mpu6050/ だけビルド）
[env:test-mpu6050]
extends = common
build_src_filter = -<*> +<../tests/test_mpu6050/>

; 左右モーター単体動作確認（src/ を除外して tests/test_motor/ だけビルド）
[env:test-motor]
extends = common
build_src_filter = -<*> +<../tests/test_motor/>

; BMM350単体動作確認（src/ を除外して tests/test_bmm350/ だけビルド）
[env:test-bmm350]
extends = common
build_src_filter = -<*> +<../tests/test_bmm350/>

; GPS方位PIDナビゲーション統合確認（src/ を除外して tests/test_navigation/ だけビルド）
[env:test-navigation]
extends = common
build_src_filter = -<*> +<../tests/test_navigation/>
